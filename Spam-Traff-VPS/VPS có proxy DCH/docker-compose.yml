# docker-compose.yml
services:
  tun2socks:
    container_name: tun2socks-${INSTANCE_ID} # Unique container name
    image: xjasonlyu/tun2socks
    restart: always
    hostname: tun2socks-host-${INSTANCE_ID} # Unique hostname
    labels:
      - project=proxy-${INSTANCE_ID}
    environment:
      - LOGLEVEL=info
      - PROXY=${PROXY_URL} # This will be set per instance
      - EXTRA_COMMANDS=ip rule add iif lo ipproto udp dport 53 lookup main;
    cap_add:
      - NET_ADMIN
    networks:
      - my_shared_proxy_network
    dns:
      - 1.1.1.1
      - 8.8.8.8
    devices:
      - /dev/net/tun:/dev/net/tun
    cpus: ${TUN2SOCKS_CPU_LIMIT:-0.05} # Updated to a much smaller value
    mem_limit: ${TUN2SOCKS_RAM_LIMIT:-128m} # Updated
    mem_reservation: ${TUN2SOCKS_RAM_RESERVE:-64m}
    logging:
      driver: json-file
      options:
        max-size: 10k
        max-file: 1
    healthcheck:
      test: ["CMD", "ip", "addr", "show", "tun0"]
      interval: 5s
      timeout: 3s
      retries: 5
  giacmotraff:
    container_name: giacmotraff-${INSTANCE_ID} # Unique container name
    image: ngtanlocc/giacmotraff:latest
    restart: always
    network_mode: service:tun2socks # Link to the specific tun2socks
    environment:
        - REPOCKET_ENABLED=false
        - EARNFM_ENABLED=false
        - PACKETSTREAM_ENABLED=false
        - TRAFFMONETIZER_ENABLED=true
        - PACKETSDK_ENABLED=false
    cpus: ${giacmotraff_CPU_LIMIT:-0.03} # NEW: Add CPU limit
    mem_limit: ${giacmotraff_RAM_LIMIT:-32m} # NEW: Add RAM limit
    mem_reservation: ${giacmotraff_RAM_RESERVE:-16m}
    logging:
      driver: json-file
      options:
        max-size: 10k
        max-file: 1
networks:
  my_shared_proxy_network:
    external: true
